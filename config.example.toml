[server]
# 可通过 CONFIG_PATH 环境变量指定配置文件路径，默认读取当前工作目录下的 config.toml
host = "0.0.0.0"
# 监听端口
port = 5000
# Github文件大小限制（字节），默认2GB
fileSize = 2147483648
# HTTP/2 多路复用
enableH2C = false
enableFrontend = true

[rateLimit]
# 每个IP每周期允许的请求数
requestLimit = 500
# 限流周期（小时）
periodHours = 3.0

[security]
# IP白名单，支持单个IP或IP段
# 白名单中的IP不受限流限制
whiteList = []

# IP黑名单，支持单个IP或IP段
# 黑名单中的IP将被直接拒绝访问
blackList = []

[access]
# 代理服务白名单（支持GitHub仓库和Docker镜像，支持通配符）
# 只允许访问白名单中的仓库/镜像，为空时不限制
whiteList = []

# 代理服务黑名单（支持GitHub仓库和Docker镜像，支持通配符）
# 禁止访问黑名单中的仓库/镜像
blackList = []

# 代理配置，支持有用户名/密码认证和无认证模式
# 无认证: socks5://127.0.0.1:1080
# 有认证: socks5://username:password@127.0.0.1:1080
# 留空不使用代理
proxy = ""

[download]
# 批量下载离线镜像数量限制
maxImages = 10

# Registry 代理开关；上游 endpoint 和鉴权 endpoint 在代码中固定维护
[registries]

# GitHub Container Registry
[registries."ghcr.io"]
enabled = true

# Docker Hub
[registries."docker.io"]
enabled = true

# Elastic Container Registry
[registries."docker.elastic.co"]
enabled = true

# Google Container Registry
[registries."gcr.io"]
enabled = true

# Microsoft Container Registry
[registries."mcr.microsoft.com"]
enabled = true

# NVIDIA Container Registry
[registries."nvcr.io"]
enabled = true

# Quay.io Container Registry
[registries."quay.io"]
enabled = true

# Kubernetes Container Registry
[registries."registry.k8s.io"]
enabled = true

[tokenCache]
# 是否启用缓存(同时控制Token和Manifest缓存)显著提升性能
enabled = true
# 默认缓存时间(分钟)
defaultTTL = "20m"
