name: hubproxy
arch: ${NFPM_ARCH}
platform: linux
version: ${NFPM_VERSION}
release: "1"
section: net
priority: optional
maintainer: wujunyi792
description: Docker and GitHub acceleration proxy server
vendor: wujunyi792
homepage: https://github.com/wujunyi792/hubproxy
license: MIT

contents:
  - src: ./build/package-root/hubproxy
    dst: /usr/bin/hubproxy
    file_info:
      mode: 0755

  - src: ./src/config.toml
    dst: /etc/hubproxy/config.toml
    type: config|noreplace
    file_info:
      mode: 0644

  - src: ./packaging/hubproxy.service
    dst: /lib/systemd/system/hubproxy.service
    file_info:
      mode: 0644

scripts:
  postinstall: ./packaging/postinstall.sh
  preremove: ./packaging/preremove.sh
  postremove: ./packaging/postremove.sh
