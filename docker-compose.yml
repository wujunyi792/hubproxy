services:
  hubproxy:
    image: ${HUBPROXY_IMAGE:-ghcr.io/wujunyi792/hubproxy:latest}
    container_name: hubproxy
    restart: always
    ports:
      - "${HUBPROXY_PORT:-5000}:5000"
    environment:
      CONFIG_PATH: /app/config.toml
      SERVER_HOST: 0.0.0.0
      SERVER_PORT: 5000
    volumes:
      - type: bind
        source: ./config.toml
        target: /app/config.toml
        read_only: true
        bind:
          create_host_path: false
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:5000/ready"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "1g"
        max-file: "2"
